<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="30%" cy="40%" r="90%">
      <stop offset="0%" stop-color="#1a1a4a"/>
      <stop offset="60%" stop-color="#0f0e2a"/>
      <stop offset="100%" stop-color="#05040f"/>
    </radialGradient>
    <radialGradient id="globe" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#8fd3ff"/>
      <stop offset="55%" stop-color="#1f5fb3"/>
      <stop offset="100%" stop-color="#0b2050"/>
    </radialGradient>
    <radialGradient id="atm" cx="50%" cy="50%" r="55%">
      <stop offset="72%" stop-color="#6ec1ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#6ec1ff" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- stars -->
  <g fill="#ffffff" opacity="0.75">
    <circle cx="120" cy="80" r="1.2"/>
    <circle cx="280" cy="140" r="0.8"/>
    <circle cx="420" cy="60" r="1"/>
    <circle cx="560" cy="100" r="0.9"/>
    <circle cx="720" cy="50" r="1.3"/>
    <circle cx="880" cy="120" r="0.8"/>
    <circle cx="1050" cy="70" r="1.1"/>
    <circle cx="150" cy="520" r="0.9"/>
    <circle cx="330" cy="560" r="1"/>
    <circle cx="490" cy="540" r="1.2"/>
    <circle cx="1080" cy="510" r="0.8"/>
    <circle cx="960" cy="580" r="1"/>
  </g>

  <!-- Globe -->
  <g transform="translate(830 315)">
    <circle r="240" fill="url(#atm)"/>
    <circle r="215" fill="url(#globe)"/>
    <!-- continents hint -->
    <path d="M-130 -30 Q-90 -90 -20 -70 T80 -90 Q150 -60 170 0 T120 90 Q60 140 -20 120 T-140 60 Z" fill="#2e7d4f" opacity="0.75"/>
    <path d="M60 -150 Q130 -160 160 -120 T150 -80 Q110 -70 80 -100 Z" fill="#2e7d4f" opacity="0.7"/>
    <path d="M-100 120 Q-40 150 20 150 T90 170 Q40 200 -50 180 Z" fill="#2e7d4f" opacity="0.65"/>
    <!-- specular highlight -->
    <ellipse cx="-85" cy="-80" rx="55" ry="25" fill="#ffffff" opacity="0.2"/>
  </g>

  <!-- Title -->
  <g font-family="'Nunito', 'Helvetica Neue', Arial, sans-serif" fill="#ffffff">
    <text x="80" y="200" font-size="96" font-weight="800" letter-spacing="-2">PLANETEARTH.LIVE</text>
    <text x="82" y="260" font-size="30" font-weight="600" fill="#8fd3ff" letter-spacing="2">PLANETARY HEALTH · LIVE · OPEN SOURCE</text>
    <text x="82" y="360" font-size="34" font-weight="400" fill="#e8e8ff" opacity="0.92">A real-time dashboard of the Earth's</text>
    <text x="82" y="404" font-size="34" font-weight="400" fill="#e8e8ff" opacity="0.92">vital signs — built from open public data.</text>

    <text x="82" y="500" font-size="22" font-weight="600" fill="#8fd3ff" opacity="0.85">NOAA · NASA · USGS · Copernicus · Argo · Open-Meteo · OpenAQ</text>
    <text x="82" y="550" font-size="26" font-weight="700" fill="#ffffff">planetearth.live</text>
  </g>
</svg>
